<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Request</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f6fa;
}

.card{
    margin-top:40px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

textarea{
    resize:none;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="card-header bg-warning">

<h4>Edit Request</h4>

</div>

<div class="card-body">

<form id="editForm">

<div class="mb-3">

<label class="form-label">

Product

</label>

<select
id="product"
class="form-select"
required>

<option value="">

-- Pilih Product --

</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

Request Title

</label>

<input
type="text"
id="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Content

</label>

<textarea
id="content"
rows="8"
class="form-control"
required></textarea>

</div>

<button
type="submit"
class="btn btn-warning">

Update

</button>

<a
href="request.html"
class="btn btn-secondary">

Kembali

</a>

</form>

<div
id="message"
class="mt-3 fw-bold">
</div>

</div>

</div>

</div>

<script>

const BASE_URL="http://192.168.0.199:9006";

const token=localStorage.getItem("access_token");

if(!token){

window.location.href="index.html";

}

const params=new URLSearchParams(window.location.search);

const uuid=params.get("uuid");

let requestId=0;

loadProduct();

loadDetail();

async function loadProduct(){

try{

const response=await fetch(

BASE_URL+"/api/product/list?page=0",

{

headers:{

Authorization:"Bearer "+token

}

}

);

const result=await response.json();

const select=document.getElementById("product");

if(result.data){

result.data.forEach(item=>{

select.innerHTML+=`

<option value="${item.product_id}">

${item.product_name}

</option>

`;

});

}

}catch(err){

console.log(err);

}

}

async function loadDetail(){

try{

const response=await fetch(

BASE_URL+"/api/request/get_by_uuid?request_uuid="+uuid,

{

headers:{

Authorization:"Bearer "+token

}

}

);

const result=await response.json();

const data=result.data;

requestId=data.request_id;

document.getElementById("title").value=data.request_title;

document.getElementById("content").value=data.content;

document.getElementById("product").value=data.product_id;

}catch(err){

alert("Gagal mengambil data.");

console.log(err);

}

}

document
.getElementById("editForm")
.addEventListener("submit",async function(e){

e.preventDefault();

const body={

request_id:requestId,

request_uuid:uuid,

hospital_id:1,

product_id:Number(document.getElementById("product").value),

request_title:document.getElementById("title").value,

content:document.getElementById("content").value,

status:"waiting"

};

try{

const response=await fetch(

BASE_URL+"/api/request/update",

{

method:"PUT",

headers:{

"Content-Type":"application/json",

Authorization:"Bearer "+token

},

body:JSON.stringify(body)

}

);

const result=await response.json();

const message=document.getElementById("message");

if(response.ok){

message.className="mt-3 text-success fw-bold";

message.innerHTML="Request berhasil diupdate.";

setTimeout(()=>{

window.location.href="request.html";

},1000);

}else{

message.className="mt-3 text-danger fw-bold";

message.innerHTML=result.message || "Update gagal.";

}

}catch(err){

document.getElementById("message").className="mt-3 text-danger fw-bold";

document.getElementById("message").innerHTML="Tidak dapat terhubung ke server.";

}

});

</script>

</body>
</html>
