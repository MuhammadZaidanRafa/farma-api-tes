<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmagitechs - Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    /* Background abstrak estetik menggunakan gradasi mesh modern */
    background: radial-gradient(at 0% 0%, #e0f2fe 0px, transparent 50%),
                radial-gradient(at 100% 0%, #e0e7ff 0px, transparent 50%),
                radial-gradient(at 100% 100%, #fef3c7 0px, transparent 50%),
                radial-gradient(at 0% 100%, #dbeafe 0px, transparent 50%),
                #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    width: 100%;
    max-width: 400px;
    /* Efek Glassmorphism (Kaca Transparan) */
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 45px 35px;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04),
                0 1px 3px rgba(0, 0, 0, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.6);
}

h2 {
    text-align: center;
    color: #0f172a;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 30px;
}

/* Sub-text estetik di bawah judul */
h2::after {
    content: "Selamat datang kembali di Farmagitechs";
    display: block;
    font-size: 13px;
    color: #64748b;
    font-weight: 400;
    margin-top: 8px;
    letter-spacing: 0;
}

form {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

input {
    width: 100%;
    padding: 14px 18px;
    margin: 0; /* Menggunakan gap dari form agar lebih konsisten */
    border: 1.5px solid rgba(15, 23, 42, 0.08);
    border-radius: 12px;
    outline: none;
    font-size: 15px;
    color: #0f172a;
    background: rgba(255, 255, 255, 0.5);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

input::placeholder {
    color: #94a3b8;
}

input:focus {
    background: #ffffff;
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

button:hover {
    background: #1d4ed8;
    box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
    transform: translateY(-1px);
}

button:active {
    transform: translateY(1px);
}

button:disabled {
    background: #cbd5e1;
    color: #64748b;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

#message {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    min-height: 21px;
}
</style>

</head>
<body>

<div class="container">

<h2>Login</h2>

<form id="loginForm">

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button id="loginBtn" type="submit">
Login
</button>

</form>

<p id="message"></p>

</div>

<script>

const BASE_URL = "http://192.168.0.199:9006";

const form = document.getElementById("loginForm");
const message = document.getElementById("message");
const button = document.getElementById("loginBtn");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    message.innerHTML = "";
    button.disabled = true;
    button.innerHTML = "Loading...";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    try{

        const response = await fetch(
            BASE_URL + "/api/keycloak_auth/login",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    username: username,
                    password: password
                })
            }
        );

        const result = await response.json();

        if(response.ok){

            const token = result.data.token.access_token;

            localStorage.setItem("access_token", token);

            message.style.color = "green";
            message.innerHTML = "Login berhasil. Mengalihkan...";

            setTimeout(function(){

                window.location.href = "request.html";

            },1000);

        }else{

            message.style.color = "red";

            if(result.message){
                message.innerHTML = result.message;
            }else{
                message.innerHTML = "Username atau password salah.";
            }

        }

    }catch(error){

        console.error(error);

        message.style.color = "red";
        message.innerHTML = "Gagal terhubung ke server.";

    }finally{

        button.disabled = false;
        button.innerHTML = "Login";

    }

});

</script>

</body>
</html>
