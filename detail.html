<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Request</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f6fa;
}

.card{
    margin-top:40px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

table td{
    padding:10px;
}

#content{
    min-height:180px;
    border:1px solid #ddd;
    padding:15px;
    border-radius:5px;
    background:white;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="card-header bg-primary text-white">

<h4>Detail Request</h4>

</div>

<div class="card-body">

<table class="table">

<tr>
<td width="200"><b>Request Title</b></td>
<td id="title">-</td>
</tr>

<tr>
<td><b>Hospital</b></td>
<td id="hospital">-</td>
</tr>

<tr>
<td><b>Product</b></td>
<td id="product">-</td>
</tr>

<tr>
<td><b>Status</b></td>
<td id="status">-</td>
</tr>

<tr>
<td><b>Request Time</b></td>
<td id="time">-</td>
</tr>

</table>

<label class="fw-bold mb-2">

Content

</label>

<div id="content">

Loading...

</div>

<br>

<a
href="request.html"
class="btn btn-secondary">

Kembali

</a>

</div>

</div>

</div>

<script>

const BASE_URL="http://192.168.0.199:9006";

const token=localStorage.getItem("access_token");

if(!token){

window.location.href="index.html";

}

const params=new URLSearchParams(window.location.search);

const uuid=params.get("uuid");

if(!uuid){

alert("Request UUID tidak ditemukan.");

window.location.href="request.html";

}

loadDetail();

async function loadDetail(){

try{

const response=await fetch(

BASE_URL+"/api/request/get_by_uuid?request_uuid="+uuid,

{

headers:{

Authorization:"Bearer "+token

}

}

);

const result=await response.json();

const data=result.data;

document.getElementById("title").innerHTML=data.request_title;
document.getElementById("hospital").innerHTML=data.hospital_name;
document.getElementById("product").innerHTML=data.product_name;
document.getElementById("status").innerHTML=data.status;
document.getElementById("time").innerHTML=data.request_time;
document.getElementById("content").innerHTML=data.content;

}catch(err){

alert("Gagal mengambil data.");

console.log(err);

}

}

</script>

</body>
</html>
